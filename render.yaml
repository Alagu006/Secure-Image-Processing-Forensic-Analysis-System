services:
  - type: web
    name: securevision
    runtime: python
    buildCommand: >
      pip install -r requirements.txt &&
      pip install ultralytics sahi &&
      python -c "from ultralytics import YOLO; YOLO('yolov8s.pt')"
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: REDIS_URL
        sync: false
      - key: API_KEY
        sync: false
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 1
